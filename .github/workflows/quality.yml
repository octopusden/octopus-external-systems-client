name: Quality Gates

on:
  push:
    branches:
      - main
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    uses: octopusden/octopus-base/.github/workflows/common-java-gradle-quality-gates.yml@v2.4.1
    with:
      java-version: '21'
      # Coverage is disabled for this repo (octopusQuality { coverage { enabled = false } }).
      # qualityCoverage still aggregates every :test task; the *-test-client / teamcity-client
      # tests require docker-compose (composeBuild/composeUp), which is unavailable on the
      # GitHub-hosted runner and fails the check. Exclude those infra-bound test tasks so the
      # gate only runs the JVM-only unit tests. Full functional tests still run in CI/TeamCity
      # where docker is available.
      coverage-command: >-
        ./gradlew qualityCoverage --no-daemon --stacktrace
        -x :gitea-test-client:test
        -x :bitbucket-test-client:test
        -x :teamcity-client:test
